<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        /* --- STYLING WELCOME BOX & BLUR BACKGROUND --- */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); /* Efek gelap transparan */
            backdrop-filter: blur(8px); /* Membuat background blur */
            -webkit-backdrop-filter: blur(8px); /* Dukungan Safari */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Memastikan berada di paling atas peta */
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .welcome-box {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 90%;
            font-family: 'Open Sans', sans-serif;
        }

        .welcome-box h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            color: #2c3e50;
        }

        .welcome-box h2 {
            margin: 0 0 20px 0;
            font-size: 18px;
            color: #7f8c8d;
            font-weight: 400;
        }

        .welcome-btn {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .welcome-btn:hover {
            background-color: #3498db;
        }

        /* Kelas untuk menghilangkan welcome box */
        .welcome-overlay.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }
        </style>
        <title>WebGIS - Farrell Ardistyo Mokodompit</title>
    </head>
    <body>
        <div class="welcome-overlay" id="welcomeOverlay">
            <div class="welcome-box">
                <h1>Selamat Datang di WebGIS</h1>
                <h2>Farrell Ardistyo Mokodompit</h2>
                <button class="welcome-btn" onclick="closeWelcomeBox()">Lihat Peta</button>
            </div>
        </div>

        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/Dissolved_1.js"></script>
        <script src="data/Cleaned_2.js"></script>
        <script src="data/Servicearealines_3.js"></script>
        <script src="data/smadimalang_4.js"></script>
        <script>
        // FUNGSI JAVASCRIPT UNTUK MENUTUP WELCOME BOX
        function closeWelcomeBox() {
            document.getElementById('welcomeOverlay').classList.add('hidden');
        }

        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[-8.093989724678622,112.49370120630185],[-7.864241411014357,112.80231834405983]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }

        map.createPane('pane_Positron_0');
        map.getPane('pane_Positron_0').style.zIndex = 400;
        var layer_Positron_0 = L.tileLayer('https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
            pane: 'pane_Positron_0',
            opacity: 1.0,
            attribution: '<a href="https://cartodb.com/basemaps/">Map tiles by CartoDB, under CC BY 3.0. Data by OpenStreetMap, under ODbL.</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        map.addLayer(layer_Positron_0);

        function pop_Dissolved_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['KDPPUM'] !== null ? autolinker.link(String(feature.properties['KDPPUM']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['NAMOBJ'] !== null ? autolinker.link(String(feature.properties['NAMOBJ']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Dissolved_1_0() {
            return {
                pane: 'pane_Dissolved_1',
                opacity: 1,
                color: 'rgba(228,26,28,1.0)',
                dashArray: '',
                lineCap: 'square',
                lineJoin: 'bevel',
                weight: 4.0,
                fillOpacity: 0,
                interactive: true,
            }
        }
        map.createPane('pane_Dissolved_1');
        map.getPane('pane_Dissolved_1').style.zIndex = 401;
        var layer_Dissolved_1 = new L.geoJson(json_Dissolved_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Dissolved_1',
            layerName: 'layer_Dissolved_1',
            pane: 'pane_Dissolved_1',
            onEachFeature: pop_Dissolved_1,
            style: style_Dissolved_1_0,
        });
        bounds_group.addLayer(layer_Dissolved_1);
        map.addLayer(layer_Dissolved_1);

        function pop_Cleaned_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['NAMRJL'] !== null ? autolinker.link(String(feature.properties['NAMRJL']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Cleaned_2_0() {
            return {
                pane: 'pane_Cleaned_2',
                opacity: 1,
                color: 'rgba(164,113,88,1.0)',
                dashArray: '',
                lineCap: 'square',
                lineJoin: 'bevel',
                weight: 1.0,
                fillOpacity: 0,
                interactive: true,
            }
        }
        map.createPane('pane_Cleaned_2');
        map.getPane('pane_Cleaned_2').style.zIndex = 402;
        var layer_Cleaned_2 = new L.geoJson(json_Cleaned_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Cleaned_2',
            layerName: 'layer_Cleaned_2',
            pane: 'pane_Cleaned_2',
            onEachFeature: pop_Cleaned_2,
            style: style_Cleaned_2_0,
        });
        bounds_group.addLayer(layer_Cleaned_2);
        map.addLayer(layer_Cleaned_2);

        function pop_Servicearealines_3(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Name'] !== null ? autolinker.link(String(feature.properties['Name']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Servicearealines_3_0() {
            return {
                pane: 'pane_Servicearealines_3',
                opacity: 1,
                color: 'rgba(87,188,79,1.0)',
                dashArray: '',
                lineCap: 'square',
                lineJoin: 'bevel',
                weight: 1.0,
                fillOpacity: 0,
                interactive: true,
            }
        }
        map.createPane('pane_Servicearealines_3');
        map.getPane('pane_Servicearealines_3').style.zIndex = 403;
        var layer_Servicearealines_3 = new L.geoJson(json_Servicearealines_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Servicearealines_3',
            layerName: 'layer_Servicearealines_3',
            pane: 'pane_Servicearealines_3',
            onEachFeature: pop_Servicearealines_3,
            style: style_Servicearealines_3_0,
        });
        bounds_group.addLayer(layer_Servicearealines_3);
        map.addLayer(layer_Servicearealines_3);

        function pop_smadimalang_4(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Name'] !== null ? autolinker.link(String(feature.properties['Name']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_smadimalang_4_0() {
            return {
                pane: 'pane_smadimalang_4',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,158,23,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_smadimalang_4');
        map.getPane('pane_smadimalang_4').style.zIndex = 404;
        var layer_smadimalang_4 = new L.geoJson(json_smadimalang_4, {
            attribution: '',
            interactive: true,
            dataVar: 'json_smadimalang_4',
            layerName: 'layer_smadimalang_4',
            pane: 'pane_smadimalang_4',
            onEachFeature: pop_smadimalang_4,
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, style_smadimalang_4_0(feature));
            },
        });
        bounds_group.addLayer(layer_smadimalang_4);
        map.addLayer(layer_smadimalang_4);
        
        setBounds();
        
        // Inisialisasi totalMarkers untuk mencegah error label QGIS2Web
        var totalMarkers = 0;
        var i = 0;
        layer_smadimalang_4.eachLayer(function(layer) {
            var context = {
                feature: layer.feature,
                variables: {}
            };
            layer.bindTooltip((layer.feature.properties['Name'] !== null?String('<div style="color: #323232; font-size: 10pt; font-family: \'Open Sans\', sans-serif;">' + layer.feature.properties['Name']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_smadimalang_4'});
            labels.push(layer);
            totalMarkers += 1;
            layer.added = true;
            addLabel(layer, i);
            i++;
        });
        
        resetLabels([layer_smadimalang_4]);
        map.on("zoomend", function(){
            resetLabels([layer_smadimalang_4]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_smadimalang_4]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_smadimalang_4]);
        });
        </script>
    </body>
</html>
